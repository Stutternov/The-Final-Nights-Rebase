author: "buffyuwu"
delete-after: True
changes:
  - rscadd: "adds much more variety to examine flavortexts for all (and lackthereof) gender(s)"
  - rscadd: "Adds more hallucinations to malkavians! look out for your mother to scold you, with different scolding phrases depending on your immortal age. e.g. milennial vamps get told to stop watching TV, 1920s vamps get told to go tend to the horses"
  - refactor: "greatly increased the time between npcs stopping to talk after being bumped/grabbed and them starting to move again. this should make it easier to pull one away to feed on. TODO: refactor it completely so that it's more interactive for kindred"
  - refactor: "no longer uses a lot of the vtm13 era glassware that have static names and icons. with the modern tg glassware, drinks will automatically change glasses to the appropriate ones for the drinks you mix into them"
  - refactor: "derangement hallucination speech is easier to distinguish and uses more artistic styling"
  - refactor: "refactors discipline middleware a bit. you will now be prompted if you try to join with 0 dots assigned, and if you try to change age you will have to wipe your discs."
  - refactor: "phone sound volume for keyboard clicks have been increased, and apps now play a sound when you open them, too. phone navigation should thereby be audible to other players, making it harder to hide that you're on your phone"
  - bugfix: "trusted status now saves from the secondcity disc admin menu when set/unset"
  - bugfix: "your generation now properly applies. previously everyone was silently defaulted to gen 10 due to the pref not being fully implemented"
  - bugfix: "endbrowser navigation buttons now work on every endbrowser screen as intended"
  - bugfix: "phones no longer display new text notifications twice, and the simulated delay between receiving the text and the notification now correctly fires. this delay is intended to give the phones a 'realistic' carrier lag time between when the text arrives and when you get notified for a new text, just like real phones"
  - bugfix: "fixed missing sprite for broken tube lights"
  - bugfix: "fixed missing sprite for sheaths"
  - rscadd: "added a warning if you try to join a round before assigning disc dots. this should help new and/or excited players from accidentally spawning in with 0 disciplines. you can choose to accept the warning and continue with just the clan commons; rares must always be assigned through the menu or via an admin"
  - bugfix: "@XeonMations fixed kiss status effect for mortals being infinite. now it will fade after 30 seconds. avoids requiring excessive logic (previously the idea was to have it be a status effect WHILE being bitten, but this is unnecessary and not performant. a simple expire time will do)"
  - bugfix: "fixes satchels showing an error sprite when concealed"
  - bugfix: "you can now use boozeomats and they no longer shout space station slogans at you"
  - bugfix: "fixed an issue where malkavians who tried to search someone's mind would be stuck with a pop up window until they relog"
  - bugfix: "fixed an issue where ghouls werent getting the malkavian clan discipline where appropriate. now anyone with the dementate discipline will receive it, as it should be"